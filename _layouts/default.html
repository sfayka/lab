<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <script>
    // Theme initialization - runs before body renders to prevent flash
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <header>
    <nav class="container">
      <a href="{{ '/' | relative_url }}" class="nav-brand">Knox Lab</a>
      <div class="nav-links">
        <a href="https://knoxanalytics.com" class="nav-link">knoxanalytics.com →</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-content container">
      <p class="footer-text">&copy; {{ site.time | date: '%Y' }} {{ site.author }}</p>
      <div class="footer-links">
        <a href="https://knoxanalytics.com">knoxanalytics.com</a>
        <a href="https://github.com/sfayka">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    // Theme toggle functionality
    const toggle = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');
    const html = document.documentElement;

    function updateThemeIcon() {
      icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
    }

    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeIcon();
    });

    updateThemeIcon();
  </script>
</body>
</html>
