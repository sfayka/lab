---
layout: default
---

<div class="post-page container">
  <article>
    <header class="post-page-header">
      <h1 class="post-page-title">{{ page.title }}</h1>
      <div class="post-page-meta">
        <span class="post-tag">{{ page.category | default: 'Essay' }}</span>
        <span>{{ page.date | date: "%-d %b, %Y" }}</span>
      </div>
    </header>

    <div class="post-page-content">
      {{ content }}
    </div>

    <footer class="post-page-footer">
      <a href="{{ '/' | relative_url }}" class="back-link">← All posts</a>
    </footer>
  </article>
</div>
